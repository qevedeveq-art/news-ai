name: Send AI Newsletter To Slack

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send newsletter to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 scripts/send_newsletter.py --lookback-hours 96
