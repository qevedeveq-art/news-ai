name: Send AI Newsletter To Slack

on:
  push:
    paths:
      - "newsletters/*.md"
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send newsletter to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            latest_file="$(ls newsletters/*.md | sort | tail -n 1)"
            python3 scripts/send_newsletter.py --input-file "$latest_file"
          else
            python3 scripts/send_newsletter.py --lookback-hours 96
          fi
