<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#060C18"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="AI.Watch"/>
  <meta name="description" content="Veille gratuite nouveautés IA : Claude, ChatGPT, Gemini"/>
  <title>AI.Watch</title>
  <script>
    (function(){
      var icon="data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#060C18"/><text x="96" y="138" font-size="100" text-anchor="middle" font-family="monospace" fill="#3B82F6">W</text></svg>');
      var m={name:"AI.Watch — Veille IA",short_name:"AI.Watch",description:"Veille gratuite Claude, ChatGPT, Gemini",start_url:"./",display:"standalone",background_color:"#060C18",theme_color:"#060C18",orientation:"portrait-primary",icons:[{src:icon,sizes:"192x192",type:"image/svg+xml"},{src:icon,sizes:"512x512",type:"image/svg+xml"}]};
      var blob=new Blob([JSON.stringify(m)],{type:"application/manifest+json"});
      var link=document.createElement("link");link.rel="manifest";link.href=URL.createObjectURL(blob);document.head.appendChild(link);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#060C18;--surface:#0D1526;--surface2:#131F38;--border:rgba(255,255,255,0.07);--text:#E2E8F0;--muted:#475569;--dim:#1E293B;--blue:#3B82F6;--amber:#D97706;--green:#10B981;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,20px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono','Courier New',monospace;overflow-x:hidden}
    body{padding-top:var(--safe-top)}
    .header{position:sticky;top:0;z-index:100;background:rgba(6,12,24,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px 10px}
    .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.03em;color:#F1F5F9}
    .logo b{color:var(--blue)}
    .logo-badge{display:inline-block;font-size:8px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6EE7B7;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle;letter-spacing:.05em}
    .logo-sub{font-size:9px;color:var(--muted);letter-spacing:.18em;margin-top:2px}
    .btn-refresh{display:flex;align-items:center;gap:7px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.4);border-radius:10px;color:#93C5FD;padding:9px 14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;transition:all .2s}
    .btn-refresh:active{transform:scale(.95);background:rgba(59,130,246,.22)}
    .btn-refresh:disabled{opacity:.5;pointer-events:none}
    .tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:11px;font-family:'Space Mono',monospace;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .18s;touch-action:manipulation}
    .tab.active{color:var(--text);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.06)}
    .tab[data-id="claude"].active{border-color:rgba(217,119,6,.5);color:#FCD34D;background:rgba(217,119,6,.1)}
    .tab[data-id="chatgpt"].active{border-color:rgba(16,185,129,.5);color:#6EE7B7;background:rgba(16,185,129,.1)}
    .tab[data-id="gemini"].active{border-color:rgba(59,130,246,.5);color:#93C5FD;background:rgba(59,130,246,.1)}
    .content{padding:16px;padding-bottom:calc(var(--safe-bottom) + 16px);min-height:calc(100dvh - 110px)}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 24px;text-align:center;gap:14px}
    .empty-icons{font-size:38px;opacity:.18;letter-spacing:14px}
    .empty-title{font-size:14px;color:#334155;font-family:'Syne',sans-serif;font-weight:700}
    .empty-sub{font-size:11px;color:#1E293B;line-height:1.7}
    .src-header{display:flex;align-items:center;gap:10px;padding:11px 13px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
    .src-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .src-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
    .src-link{font-size:10px;color:var(--muted);text-decoration:none}
    .card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;text-decoration:none;animation:fadeUp .3s ease both}
    .card:active{background:var(--surface2)}
    .card-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.45;margin-bottom:7px;font-family:'Syne',sans-serif}
    .card-meta{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--muted);margin-bottom:7px;flex-wrap:wrap}
    .card-summary{font-size:11px;color:#64748B;line-height:1.55}
    .card-arrow{text-align:right;font-size:10px;color:var(--dim);margin-top:8px}
    .skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;margin-bottom:10px}
    .status-bar{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);border-radius:8px;padding:8px 12px;font-size:10px;color:#60A5FA;letter-spacing:.06em;display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .error-bar{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 12px;font-size:11px;color:#FCA5A5;line-height:1.5;margin-bottom:10px}
    .warn-bar{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.2);border-radius:8px;padding:8px 12px;font-size:10px;color:#FCD34D;line-height:1.5;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .link-card{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:8px;text-decoration:none}
    .link-card:active{background:var(--surface2)}
    .link-card-label{font-size:12px;color:var(--text)}
    .link-label-sub{font-size:9px;color:var(--muted);margin-top:2px}
    .section-label{font-size:9px;color:var(--muted);letter-spacing:.14em;margin-bottom:10px;padding-left:2px}
    .install-banner{display:none;background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(16,185,129,.08));border:1px solid rgba(59,130,246,.28);border-radius:12px;padding:12px 14px;margin-bottom:14px;align-items:center;gap:10px}
    .install-banner.show{display:flex}
    .install-text{flex:1;font-size:11px;color:#93C5FD;line-height:1.45}
    .btn-install{background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.4);border-radius:8px;color:#93C5FD;padding:7px 11px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation}
    .footer{font-size:9px;color:var(--dim);text-align:center;padding:20px 0 8px;letter-spacing:.08em}
    .refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .refresh-time{font-size:9px;color:var(--dim)}
    .spin{animation:spin .85s linear infinite;display:inline-block}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div>
      <div class="logo">AI<b>.</b>Watch <span class="logo-badge">GRATUIT</span></div>
      <div class="logo-sub">VEILLE NOUVEAUTÉS IA</div>
    </div>
    <button class="btn-refresh" id="btnRefresh" onclick="handleRefresh()">
      <span id="refreshIcon">&#x27F3;</span>
      <span id="refreshLabel">ACTUALISER</span>
    </button>
  </div>
  <div class="tabs">
    <button class="tab active" data-id="all"     onclick="switchTab('all')">&#9672;&#9678;&#9671; Tous</button>
    <button class="tab"        data-id="claude"  onclick="switchTab('claude')">&#9672; Claude</button>
    <button class="tab"        data-id="chatgpt" onclick="switchTab('chatgpt')">&#9678; ChatGPT</button>
    <button class="tab"        data-id="gemini"  onclick="switchTab('gemini')">&#9671; Gemini</button>
    <button class="tab"        data-id="links"   onclick="switchTab('links')">&#8599; Liens</button>
  </div>
</div>
<div class="content" id="content"></div>
<script>
const RSS2JSON="https://api.rss2json.com/v1/api.json?rss_url=";
const ALLORIGINS="https://api.allorigins.win/get?url=";
const HN_API="https://hn.algolia.com/api/v1/search";

const SOURCES=[
  {id:"claude",name:"Claude / Anthropic",short:"Anthropic",color:"#D97706",bg:"rgba(217,119,6,.12)",bd:"rgba(217,119,6,.4)",tx:"#FCD34D",icon:"◈",url:"https://www.anthropic.com/news",
   feeds:["https://www.anthropic.com/rss.xml","https://www.anthropic.com/news/rss"],hnQuery:"Anthropic Claude AI"},
  {id:"chatgpt",name:"ChatGPT / OpenAI",short:"OpenAI",color:"#10B981",bg:"rgba(16,185,129,.12)",bd:"rgba(16,185,129,.4)",tx:"#6EE7B7",icon:"◎",url:"https://openai.com/news",
   feeds:["https://openai.com/blog/rss.xml","https://openai.com/news/rss.xml"],hnQuery:"OpenAI ChatGPT"},
  {id:"gemini",name:"Gemini Pro / Google",short:"Google AI",color:"#3B82F6",bg:"rgba(59,130,246,.12)",bd:"rgba(59,130,246,.4)",tx:"#93C5FD",icon:"◇",url:"https://blog.google/technology/ai/",
   feeds:["https://blog.google/technology/ai/rss/","https://blog.google/rss/"],hnQuery:"Google Gemini AI"}
];

const EXT_LINKS=[
  {label:"Anthropic News",    sub:"Blog officiel",         url:"https://www.anthropic.com/news"},
  {label:"OpenAI Blog",       sub:"Blog officiel",         url:"https://openai.com/news"},
  {label:"Google AI Blog",    sub:"Blog officiel",         url:"https://blog.google/technology/ai/"},
  {label:"The Verge — AI",   sub:"Actualités IA",         url:"https://www.theverge.com/ai-artificial-intelligence"},
  {label:"Google Alerts",     sub:"Alertes email gratuites",url:"https://www.google.com/alerts"},
  {label:"Reddit r/ClaudeAI", sub:"Communauté",            url:"https://www.reddit.com/r/ClaudeAI/"},
  {label:"Reddit r/ChatGPT",  sub:"Communauté",            url:"https://www.reddit.com/r/ChatGPT/"},
  {label:"X @AnthropicAI",    sub:"Twitter officiel",      url:"https://twitter.com/AnthropicAI"},
  {label:"X @OpenAI",         sub:"Twitter officiel",      url:"https://twitter.com/OpenAI"}
];

let news={claude:[],chatgpt:[],gemini:[]};
let loading={claude:false,chatgpt:false,gemini:false};
let errors={claude:null,chatgpt:null,gemini:null};
let srcUsed={claude:"—",chatgpt:"—",gemini:"—"};
let tab="all",lastRefresh=null,searched=false,deferredPrompt=null;

window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  const b=document.getElementById("installBanner");if(b)b.classList.add("show");
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById("installBanner");if(b)b.classList.remove("show");});
}

if("serviceWorker"in navigator){
  const sw=`const C="aiwatch-v3";self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(["./"])));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));});self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("./"))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
}

function switchTab(id){
  tab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector(`.tab[data-id="${id}"]`).classList.add("active");
  render();
}

function anyLoading(){return Object.values(loading).some(Boolean)}

async function handleRefresh(){
  if(anyLoading())return;
  searched=true;
  news={claude:[],chatgpt:[],gemini:[]};
  errors={claude:null,chatgpt:null,gemini:null};
  srcUsed={claude:"—",chatgpt:"—",gemini:"—"};
  setBtnState(true);render();
  await Promise.all(SOURCES.map(fetchSource));
  lastRefresh=new Date();setBtnState(false);render();
}

function setBtnState(on){
  const btn=document.getElementById("btnRefresh");if(!btn)return;
  btn.disabled=on;
  document.getElementById("refreshIcon").className=on?"spin":"";
  document.getElementById("refreshIcon").textContent="⟳";
  document.getElementById("refreshLabel").textContent=on?"ANALYSE...":"ACTUALISER";
}

async function fetchSource(src){
  loading[src.id]=true;render();
  let items=[];

  // STRATÉGIE 1 : rss2json.com — proxy RSS→JSON sans clef
  for(const feed of src.feeds){
    try{
      const r=await fetch(`${RSS2JSON}${encodeURIComponent(feed)}&count=5`,{signal:AbortSignal.timeout(9000)});
      if(!r.ok)continue;
      const d=await r.json();
      if(d.status==="ok"&&d.items&&d.items.length>0){
        items=d.items.slice(0,4).map(it=>({
          title:clean(it.title||""),
          summary:clean(stripHtml(it.description||it.content||"")),
          url:it.link||src.url,
          date:fmtDate(it.pubDate)
        }));
        srcUsed[src.id]="RSS officiel";break;
      }
    }catch(_){}
  }

  // STRATÉGIE 2 : allorigins.win — proxy CORS + parse XML maison
  if(!items.length){
    for(const feed of src.feeds){
      try{
        const r=await fetch(`${ALLORIGINS}${encodeURIComponent(feed)}`,{signal:AbortSignal.timeout(9000)});
        if(!r.ok)continue;
        const d=await r.json();
        if(!d.contents)continue;
        const parsed=parseRSS(d.contents,src.url);
        if(parsed.length){items=parsed.slice(0,4);srcUsed[src.id]="RSS (proxy)";break;}
      }catch(_){}
    }
  }

  // STRATÉGIE 3 : HackerNews Algolia — toujours gratuit, CORS OK
  if(!items.length){
    try{
      const r=await fetch(`${HN_API}?query=${encodeURIComponent(src.hnQuery)}&tags=story&hitsPerPage=6`,{signal:AbortSignal.timeout(9000)});
      if(r.ok){
        const d=await r.json();
        items=(d.hits||[]).filter(h=>h.url||h.objectID).slice(0,4).map(h=>({
          title:clean(h.title||""),
          summary:"",
          url:h.url||`https://news.ycombinator.com/item?id=${h.objectID}`,
          date:fmtDate(h.created_at)
        }));
        if(items.length)srcUsed[src.id]="HackerNews";
      }
    }catch(_){}
  }

  if(!items.length)errors[src.id]="Impossible de récupérer les données. Vérifie ta connexion internet.";
  news[src.id]=items;loading[src.id]=false;render();
}

function parseRSS(xml,fallbackUrl){
  try{
    const doc=new DOMParser().parseFromString(xml,"text/xml");
    return Array.from(doc.querySelectorAll("item")).slice(0,4).map(it=>({
      title:clean(it.querySelector("title")?.textContent||""),
      summary:clean(stripHtml(it.querySelector("description")?.textContent||"")),
      url:(it.querySelector("link")?.textContent||"").trim()||fallbackUrl,
      date:fmtDate(it.querySelector("pubDate")?.textContent||"")
    })).filter(x=>x.title);
  }catch(_){return[];}
}

function stripHtml(h){
  return(h||"").replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/\s+/g," ").trim().slice(0,180);
}
function clean(s){return(s||"").replace(/\s+/g," ").trim();}
function fmtDate(r){
  if(!r)return"";
  try{const d=new Date(r);return isNaN(d)?r:d.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});}
  catch(_){return r;}
}
function safe(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function render(){
  const el=document.getElementById("content");if(!el)return;
  let h="";
  h+=`<div class="install-banner" id="installBanner"${deferredPrompt?' style="display:flex"':""}>
    <div class="install-text">📲 Installer AI.Watch sur l'écran d'accueil ?</div>
    <button class="btn-install" onclick="installPWA()">INSTALLER</button>
  </div>`;

  if(!searched){
    h+=`<div class="empty-state">
      <div class="empty-icons">◈ ◎ ◇</div>
      <div class="empty-title">Prêt à surveiller les IA</div>
      <div class="empty-sub">Appuie sur <b style="color:#93C5FD">ACTUALISER</b><br>pour voir les dernières nouveautés<br>
        <span style="color:#1E293B;font-size:10px;display:block;margin-top:4px">RSS officiels + HackerNews · 100% gratuit</span>
      </div></div>`;
    el.innerHTML=h;return;
  }

  if(anyLoading()){
    const names=SOURCES.filter(s=>loading[s.id]).map(s=>s.short).join(", ");
    h+=`<div class="status-bar"><span class="spin">◌</span> Récupération : ${names}…</div>`;
  }
  if(lastRefresh){
    h+=`<div class="refresh-row">
      <span class="refresh-time">MAJ : ${lastRefresh.toLocaleTimeString("fr-FR")}</span>
    </div>`;
  }

  if(tab==="links")h+=renderLinks();
  else if(tab==="all")h+=renderAll();
  else{const s=SOURCES.find(x=>x.id===tab);h+=renderSrc(s);}

  h+=`<div class="footer">AI.Watch · RSS officiels + HackerNews · 100% gratuit · sans inscription</div>`;
  el.innerHTML=h;
  if(deferredPrompt){const b=document.getElementById("installBanner");if(b)b.style.display="flex";}
}

function renderAll(){
  return SOURCES.map(s=>`<div style="margin-bottom:22px">
    ${hdr(s)}
    ${loading[s.id]?skel(2):errors[s.id]?`<div class="error-bar">⚠ ${safe(errors[s.id])}</div>`:
      !news[s.id].length?`<div style="font-size:11px;color:var(--dim);text-align:center;padding:10px 0">Aucun article trouvé</div>`:
      news[s.id].slice(0,2).map(a=>crd(a,s)).join("")}
  </div>`).join("");
}

function renderSrc(s){
  return hdr(s)+(loading[s.id]?skel(4):errors[s.id]?`<div class="error-bar">⚠ ${safe(errors[s.id])}</div>`:
    !news[s.id].length?`<div style="font-size:12px;color:var(--dim);text-align:center;padding:30px 0">Aucun article trouvé</div>`:
    news[s.id].map(a=>crd(a,s)).join(""));
}

function hdr(s){
  const lbl=srcUsed[s.id]&&srcUsed[s.id]!=="—"?`<span style="font-size:9px;color:var(--muted);margin-left:4px">· ${safe(srcUsed[s.id])}</span>`:"";
  return`<div class="src-header">
    <div class="src-icon" style="background:${s.bg};border:1.5px solid ${s.bd};color:${s.color}">${s.icon}</div>
    <div>
      <div class="src-name" style="color:${s.tx}">${safe(s.name)}${lbl}</div>
      <a href="${s.url}" target="_blank" rel="noopener" class="src-link">↗ Blog officiel</a>
    </div></div>`;
}

function crd(a,s){
  return`<a href="${safe(a.url||s.url)}" target="_blank" rel="noopener" class="card">
    <div class="card-title">${safe(a.title)}</div>
    <div class="card-meta">
      ${a.date?`<span>${safe(a.date)}</span><span style="color:var(--dim)">·</span>`:""}
      <span style="color:${s.color}">${safe(s.short)}</span>
    </div>
    ${a.summary?`<div class="card-summary">${safe(a.summary)}</div>`:""}
    <div class="card-arrow">↗ Lire l'article</div>
  </a>`;
}

function skel(n){
  return Array.from({length:n},(_,i)=>`<div class="skel" style="height:82px;animation-delay:${i*.15}s"></div>`).join("");
}

function renderLinks(){
  const alerts=['"Claude Anthropic" nouveautés','"ChatGPT" nouvelles fonctionnalités','"Gemini Pro" mise à jour'];
  return`<div class="section-label">SOURCES OFFICIELLES & COMMUNAUTÉS</div>
    ${EXT_LINKS.map(l=>`<a href="${l.url}" target="_blank" rel="noopener" class="link-card">
      <div><div class="link-card-label">${l.label}</div>${l.sub?`<div class="link-label-sub">${l.sub}</div>`:""}</div>
      <span style="color:var(--muted);font-size:12px">↗</span>
    </a>`).join("")}
    <div style="height:16px"></div>
    <div class="section-label">ALERTES EMAIL GRATUITES — GOOGLE ALERTS</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px">
      ${alerts.map(q=>`<a href="https://www.google.com/alerts#1:${encodeURIComponent(q)}" target="_blank" rel="noopener"
        style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--blue);padding:9px 0;border-bottom:1px solid var(--border);text-decoration:none">
        <span>🔔 ${q}</span><span style="color:var(--dim)">↗</span></a>`).join("")}
    </div>
    <div style="height:12px"></div>
    <div class="warn-bar"><span>ℹ</span>
      <span>Sources : RSS officiels → proxy CORS (allorigins) → HackerNews Algolia. Aucune clef API requise.</span>
    </div>`;
}

render();
</script>
</body>
</html>
